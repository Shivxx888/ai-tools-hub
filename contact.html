<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact AI Tools Hub - Get in touch with our team">
    <title>Contact - AI Tools Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">⚡ AI Tools Hub</div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#tools" class="nav-link">Tools</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>

    <section class="hero" style="padding: 80px 20px;">
        <h1 style="font-size: 50px; margin-bottom: 20px;">Contact Us</h1>
        <p style="font-size: 18px; color: #cbd5e1; max-width: 600px; margin: 0 auto;">We'd love to hear from you. Get in touch with our team.</p>
    </section>

    <section style="padding: 60px 20px; background: #0f172a;">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto;">
                <form onsubmit="handleContactForm(event)" style="background: #1e293b; padding: 40px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.1);">
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #38bdf8; font-weight: 600;">Name</label>
                        <input type="text" required style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 8px; color: white;">
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #38bdf8; font-weight: 600;">Email</label>
                        <input type="email" required style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 8px; color: white;">
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #38bdf8; font-weight: 600;">Subject</label>
                        <input type="text" required style="width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 8px; color: white;">
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 10px; color: #38bdf8; font-weight: 600;">Message</label>
                        <textarea required style="width: 100%; padding: 12px; height: 150px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 8px; color: white; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; cursor: pointer;">Send Message</button>
                </form>
                <div style="margin-top: 40px; text-align: center;">
                    <p style="color: #cbd5e1; margin-bottom: 20px;">📧 Email: contact@aitoolshub.com</p>
                    <p style="color: #cbd5e1;">💬 Response time: Within 24 hours</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 AI Tools Hub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        function handleContactForm(event) {
            event.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            event.target.reset();
        }
    </script>
</body>
</html>
